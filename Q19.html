<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Q19.css">
</head>

<body>
    <h2 class="form-title">REGISTRATION / LOGIN FORM</h2>

    <div class="container">
        <div class="form-box">
            <h3>Register Form :</h3>
            <input type="text" placeholder="Username">
            <input type="email" placeholder="Email">
            <p class="hint">Please enter a valid email address</p>
            <input type="password" placeholder="Password">
            <p class="hint">Minimum of 6 characters</p>
            <input type="password" placeholder="Confirm password">

            <div class="radio-group">
                <input type="radio" name="gender"> Female
                <input type="radio" name="gender"> Male
            </div>

            <div class="check-group">
                <input type="checkbox"> I have read and accept terms of use.
            </div>
            <button class="btn">SUBMIT</button>
        </div>

        <div class="form-box">
            <h3>Login form :</h3>
            <input type="email" placeholder="Enter Your Email">
            <input type="password" placeholder="Password">
            <div class="check-group">
                <input type="checkbox"> Remember me
            </div>
            <button class="btn">LOGIN</button>
        </div>
    </div>
</body>

</html>
