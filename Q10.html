<!DOCTYPE html>
<html>
<head>
    <title>Time Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 600px;
            margin: auto;
            text-align: center;
            font-family: Arial;
        }
        th, td {
            border: 2px solid black;
            padding: 8px;
        }
        .title {
            font-size: 22px;
            font-weight: bold;
        }
        .hours {
            writing-mode: horizontal;
            transform: rotate(0deg);
            font-weight: bold;
        }
        .lunch {
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>

<body>

<table>
    <tr>
        <th colspan="6" class="title">Time Table</th>
    </tr>

    <tr>
        <th rowspan="6" class="hours">Hours</th>
        <th>Mon</th>
        <th>Tue</th>
        <th>Wed</th>
        <th>Thu</th>
        <th>Fri</th>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td>Science</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td>Science</td>
        <td>Arts</td>
    </tr>

    <tr>
        <td colspan="5" class="lunch">Lunch</td>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
        <td rowspan="2" colspan="2">Project</td>
    </tr>

    <tr>
        <td>Math</td>
        <td>Science</td>
        <td>Math</td>
    </tr>
</table>

</body>
</html>
