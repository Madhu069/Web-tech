<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-site</title>
     <link rel="stylesheet" href="Q3.css">
</head>
<body>
    <nav>
        <a href="#about">About Us</a>
        <a href="#services">Services</a>
        <a href="#gallery">Gallery</a>
        <a href="#contact">Contact Us</a>
    </nav>

    <section id="about">
        <h2>About Our Fashion Brand</h2>
        <p>We provide the latest fashion collections with premium quality and style.</p>
    </section>

    <section id="services">
        <h2>Our Services</h2>
        <p>Clothing sales, fashion advice, styling tips, and home delivery services.</p>
    </section>

    <section id="gallery" class="gallery">
        <h2>Gallery</h2>
        <img src="images/img1.jpg" alt="Product 1">
        <img src="images/img2.jpg" alt="Product 2">
        <img src="images/img3.jpg" alt="Product 3">
    </section>

    <section id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name">
            <input type="email" placeholder="Your Email">
            <textarea placeholder="Your Message"></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
</body>
</html>
