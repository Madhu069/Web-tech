<!DOCTYPE html>
<html>
<head>
    <title>Image Map</title>
</head>
<body>

<h2>Image Map Example</h2>

<img src="images/img2.jpg" usemap="#map" width="400" height="300">

<map name="map">
    <area shape="rect" coords="50,50,150,150" href="#" alt="Rectangle">
    <area shape="circle" coords="250,150,40" href="#" alt="Circle">
    <area shape="poly" coords="200,50,300,50,350,120,250,120" href="#" alt="Polygon">
</map>

</body>
</html>
