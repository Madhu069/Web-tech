<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" href="Q18.css">
</head>
<body>

<h2 class="title">Registration Form</h2>

<form class="box">
    <fieldset>
        <legend>Personal Details</legend>

        <label>Name</label>
        <input type="text" placeholder="Enter Name">

        <label>Address</label>
        <input type="text">

        <label>Phone</label>
        <input type="text">

        <label>Gender</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female

        <label>Country</label>
        <select>
            <option>Select Country</option>
            <option>Nepal</option>
            <option>India</option>
            <option>USA</option>
        </select>

        <label>Message</label>
        <textarea></textarea>

        <label>Image</label>
        <input type="file">

        <input type="checkbox"> I Accept Term & Condition

        <div class="btn">
            <input type="submit" value="Register" class="register">
            <input type="reset" value="Clear" class="clear">
        </div>

    </fieldset>
</form>

</body>
</html>
